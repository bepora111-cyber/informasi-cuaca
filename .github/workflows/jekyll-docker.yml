name: Deploy Jekyll site to Pages

on:
  push:
    branches: [ "main" ]

  # Mengizinkan menjalankan workflow ini secara manual dari tab Actions
  workflow_dispatch:

# Mengatur izin GITHUB_TOKEN untuk mengizinkan penyebaran ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mengizinkan satu penyebaran bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job untuk Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Job untuk Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ deeds.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
